<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Your Cart - CSCE 361 Store</title>
    <link rel="stylesheet" href="global.css">
    <link rel="stylesheet" href="cart.css">
</head>
<body>
    <header class="header">
        <div class="header__top-bar">
            <span>FREE SHIPPING FOR MEMBERS</span>
        </div>

        <nav class="header__navbar">
            <div class="header__logo">
                <img src="your-logo.png" alt="Store Logo">
            </div>

            <ul class="header__nav-menu">
                <li><a href="#" class="header__nav-link">OUR PRODUCTS</a></li>
                <li><a href="#" class="header__nav-link header__nav-link--sale">SALE</a></li>
            </ul>

            <div class="header__actions">
                <div class="search-bar" id="search-component">
                    <input type="text" class="search-bar__input" placeholder="Search by name/category...">
                    <button class="search-bar__btn" id="btn-search">🔍</button>
                </div>
                
                <a href="login.html" class="header__icon" id="link-login">👤</a>
                <div class="cart-status">
                    <a href="cart.html" class="header__icon" id="link-cart">🛒</a>
                    <span class="cart-status__badge" id="cart-count">0</span>
                </div>
            </div>
        </nav>
    </header>

    <main class="cart-container">
        <h1>Your Shopping Cart</h1>
        <div class="cart-wrapper">
            <div class="cart-items" id="cart-items-list">
                <article class="cart-item">
                    <img src="https://via.placeholder.com/100" alt="Product">
                    <div class="item-info">
                        <h4>Sample Product</h4>
                        <p>SKU: SHOE-12345</p>
                    </div>
                    <div class="item-qty">
                        <input type="number" value="1" min="1">
                    </div>
                    <div class="item-price">$120.00</div>
                    <button class="btn-remove">×</button>
                </article>
            </div>

            <aside class="cart-summary">
                <h3>Summary</h3>
                <div class="summary-row">
                    <span>Subtotal</span>
                    <span id="cart-subtotal">$120.00</span>
                </div>
                <div class="summary-row">
                    <span>Shipping</span>
                    <span>Free</span>
                </div>
                <hr>
                <div class="summary-row total">
                    <span>Total</span>
                    <span id="cart-total">$120.00</span>
                </div>
                <a href="checkout.html" class="btn-checkout">Go to Checkout</a>
            </aside>
        </div>
    </main>
</body>
</html>
