<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Checkout - CSCE 361 Store</title>
    <link rel="stylesheet" href="global.css">
    <link rel="stylesheet" href="checkout.css">
</head>
<body>
    <header class="header"> </header>

    <main class="checkout-container">
        <form id="checkout-form">
            <section class="checkout-section">
                <h2>Shipping Information</h2>
                <input type="text" id="ship-name" placeholder="Full Name" required>
                <input type="text" id="ship-address" placeholder="Address" required>
                <div class="form-row">
                    <input type="text" id="ship-city" placeholder="City" required>
                    <input type="text" id="ship-zip" placeholder="ZIP Code" required>
                </div>
            </section>

            <section class="checkout-section">
                <h2>Payment Details</h2>
                <input type="text" id="card-name" placeholder="Name on Card" required>
                <input type="text" id="card-number" placeholder="Card Number" required>
                <div class="form-row">
                    <input type="text" id="card-exp" placeholder="MM/YY" required>
                    <input type="text" id="card-cvv" placeholder="CVV" required>
                </div>
            </section>

            <button type="submit" class="btn-submit-order">Place Order</button>
        </form>
    </main>
</body>
</html>
